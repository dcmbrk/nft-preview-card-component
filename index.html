<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="./css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | NFT preview card component</title>
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class="eye-image-container">
      <img class="eye-image" src="./images/icon-view.svg" alt="">
    </div>
    <img class="card-image" src="./images/image-equilibrium.jpg" alt="">
    <p class="card-name">Equilibrium #3429</p>
    <p class="card-description">Our Equilibrium collection promotes balance and calm.</p>
    <div class="card-ntf">
      <p class="card-nft-price">
        <img class="icon" src="./images/icon-ethereum.svg" alt="">
        0.041 ETH
      </p>
      <p class="card-nft-time-left">
        <img class="icon" src="./images/icon-clock.svg" alt="">
        3 days left
      </p>
    </div>
    <div class="card-author">
      <img class="card-author-image" src="./images/image-avatar.png" alt="">
      <p class="card-author-name">Creation of <span>Jules Wyvern</span></p>
    </div>
  </main>
</body>
</html>
